name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++

    - name: Create build directory
      run: mkdir -p build

    - name: Configure project
      run: |
        cd build
        cmake ..

    - name: Build project
      run: |
        cd build
        make -j4

    - name: Run simulator
      run: |
        cd build
        ./fwos-x